name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install just
        run: nix profile install nixpkgs#just

      - name: Check disk space
        run: df -h

      - name: Run unit tests
        run: just test-verbose

      - name: Garbage collect after tests
        run: |
          nix-collect-garbage -d
          nix store gc
          df -h

      - name: Check flake (minimal evaluation)
        run: |
          # Only check flake structure, don't build everything
          echo "Checking flake metadata..."
          nix flake metadata
          echo "Checking flake outputs structure..."
          nix flake show --quiet
          # Quick syntax validation without full evaluation
          echo "Validating flake syntax..."
          nix eval .#nixosConfigurations --apply 'builtins.attrNames' --quiet
          nix eval .#darwinConfigurations --apply 'builtins.attrNames' --quiet || true

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install just
        run: nix profile install nixpkgs#just

      - name: Check for dead code
        run: just lint-check

      - name: Format check
        run: |
          # Run formatting and check if any files changed
          just fmt
          if ! git diff --exit-code; then
            echo "Files are not properly formatted. Run 'just fmt' locally and commit the changes."
            exit 1
          fi

  discover-nixos-hosts:
    name: Discover NixOS Hosts
    runs-on: ubuntu-latest
    outputs:
      hosts: ${{ steps.discover.outputs.hosts }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Discover NixOS hosts
        id: discover
        run: |
          if [ -d "hosts/nixos" ]; then
            hosts=$(find hosts/nixos/ -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | jq -R -s -c 'split("\n")[:-1]')
          else
            hosts="[]"
          fi
          echo "hosts=$hosts" >> $GITHUB_OUTPUT
          echo "Discovered NixOS hosts: $hosts"

  build-nixos:
    name: Build NixOS Configurations
    runs-on: ubuntu-latest
    needs: discover-nixos-hosts
    if: needs.discover-nixos-hosts.outputs.hosts != '[]'
    strategy:
      matrix:
        host: ${{ fromJson(needs.discover-nixos-hosts.outputs.hosts) }}
      # Build sequentially to avoid disk space issues
      max-parallel: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          # Enable more aggressive garbage collection
          extra-conf: |
            max-free = 1073741824
            min-free = 268435456

      - name: Setup Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install just
        run: nix profile install nixpkgs#just

      - name: Check initial disk space
        run: |
          df -h
          du -sh /nix/store || true

      - name: Build ${{ matrix.host }}
        run: |
          echo "Building ${{ matrix.host }}..."
          just build ${{ matrix.host }}

      - name: Cleanup build artifacts
        if: always()
        run: |
          echo "Cleaning up after building ${{ matrix.host }}..."
          # Aggressive cleanup to free disk space
          nix-collect-garbage -d || true
          nix store gc --max-freed 2G || true
          nix store optimise || true
          # Clean up any temporary files and caches
          rm -rf /tmp/nix-* || true
          rm -rf ~/.cache/nix || true
          # Clear any evaluation caches
          rm -rf ~/.cache/nix-eval-cache || true
          echo "Disk space after cleanup:"
          df -h
          echo "Nix store size:"
          du -sh /nix/store || true

  discover-darwin-hosts:
    name: Discover Darwin Hosts
    runs-on: ubuntu-latest
    outputs:
      hosts: ${{ steps.discover.outputs.hosts }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Discover Darwin hosts
        id: discover
        run: |
          if [ -d "hosts/darwin" ]; then
            hosts=$(find hosts/darwin/ -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | jq -R -s -c 'split("\n")[:-1]')
          else
            hosts="[]"
          fi
          echo "hosts=$hosts" >> $GITHUB_OUTPUT
          echo "Discovered Darwin hosts: $hosts"

  build-darwin:
    name: Build Darwin Configurations
    runs-on: macos-latest
    needs: discover-darwin-hosts
    if: needs.discover-darwin-hosts.outputs.hosts != '[]'
    strategy:
      matrix:
        host: ${{ fromJson(needs.discover-darwin-hosts.outputs.hosts) }}
      # Build sequentially to avoid disk space issues
      max-parallel: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          # Enable more aggressive garbage collection
          extra-conf: |
            max-free = 1073741824
            min-free = 268435456

      - name: Setup Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install just
        run: nix profile install nixpkgs#just

      - name: Check initial disk space
        run: |
          df -h
          du -sh /nix/store || true

      - name: Build ${{ matrix.host }}
        run: |
          echo "Building ${{ matrix.host }}..."
          just build ${{ matrix.host }}

      - name: Cleanup build artifacts
        if: always()
        run: |
          echo "Cleaning up after building ${{ matrix.host }}..."
          # Aggressive cleanup to free disk space
          nix-collect-garbage -d || true
          nix store gc --max-freed 2G || true
          nix store optimise || true
          # Clean up any temporary files and caches
          rm -rf /tmp/nix-* || true
          rm -rf ~/.cache/nix || true
          # Clear any evaluation caches
          rm -rf ~/.cache/nix-eval-cache || true
          echo "Disk space after cleanup:"
          df -h
          echo "Nix store size:"
          du -sh /nix/store || true